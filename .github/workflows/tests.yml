name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  vet-and-test:
    name: Vet and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: go vet
        env:
          GOOS: js
          GOARCH: wasm
        run: go vet ./...

      - name: Test
        run: go test -v -race -count=1 ./internal/shm/... ./videoutils/...

  build-native:
    name: Build native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install GStreamer (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-bad1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-tools

      - name: Install GStreamer (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install \
            gstreamer \
            gst-plugins-base \
            gst-plugins-good \
            gst-plugins-bad

      - name: Set up MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          path-type: inherit
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-gstreamer
            mingw-w64-x86_64-gst-plugins-base
            mingw-w64-x86_64-gst-plugins-good
            mingw-w64-x86_64-gst-plugins-bad

      - name: Build (native, Linux/macOS)
        if: runner.os != 'Windows'
        env:
          CGO_ENABLED: "1"
          PKG_CONFIG_PATH: ${{ runner.os == 'macOS' && '/opt/homebrew/lib/pkgconfig' || '' }}
        run: go build ./...

      - name: Build (native, Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          export CGO_ENABLED=1
          export CC=gcc
          go build ./...

      - name: Build (sidecar tag, Linux/macOS)
        if: runner.os != 'Windows'
        env:
          CGO_ENABLED: "1"
          PKG_CONFIG_PATH: ${{ runner.os == 'macOS' && '/opt/homebrew/lib/pkgconfig' || '' }}
        run: go build -tags sidecar ./...

      - name: Build (sidecar tag, Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          export CGO_ENABLED=1
          export CC=gcc
          go build -tags sidecar ./...

  build-wasm:
    name: Build WebAssembly
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build (js/wasm)
        env:
          GOOS: js
          GOARCH: wasm
          CGO_ENABLED: "0"
        run: go build ./video/... ./videoutils/...