name: Build Sidecar

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-linux:
    name: Linux (amd64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install GStreamer
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-bad1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-tools

      - name: Build sidecar
        run: go build -o sidecar-linux-amd64 ./cmd/sidecar

      - uses: actions/upload-artifact@v4
        with:
          name: sidecar-linux-amd64
          path: sidecar-linux-amd64
          retention-days: 7

  build-macos:
    name: macOS (arm64)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install GStreamer
        run: |
          brew install \
            gstreamer \
            gst-plugins-base \
            gst-plugins-good \
            gst-plugins-bad \

      - name: Build sidecar
        env:
          CGO_ENABLED: "1"
          PKG_CONFIG_PATH: /opt/homebrew/lib/pkgconfig
        run: go build -o sidecar-macos-arm64 ./cmd/sidecar

      - uses: actions/upload-artifact@v4
        with:
          name: sidecar-macos-arm64
          path: sidecar-macos-arm64
          retention-days: 7

  build-windows:
    name: Windows (amd64)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-gstreamer
            mingw-w64-x86_64-gst-plugins-base
            mingw-w64-x86_64-gst-plugins-good
            mingw-w64-x86_64-gst-plugins-bad
            mingw-w64-x86_64-ntldd

      - name: Build sidecar
        shell: msys2 {0}
        run: |
          export PATH="$(cygpath "$GOROOT")/bin:$PATH"
          export CGO_ENABLED=1
          export CC=gcc
          go build -o sidecar.exe ./cmd/sidecar

      - name: Bundle DLLs
        shell: msys2 {0}
        run: |
          set -euo pipefail

          DIST="dist"
          mkdir -p "$DIST/lib/gstreamer-1.0"

          # Copy the binary
          cp sidecar.exe "$DIST/"

          # ---------- helper: recursively resolve MINGW64 DLL deps ----------
          collect_deps() {
            local binary="$1"
            ntldd -R "$binary" 2>/dev/null \
              | grep -io '=> /mingw64/[^ ]*' \
              | sed 's/^=> //' \
              | sort -u
          }

          # ---------- 1. DLLs needed by the main binary ----------
          for dll in $(collect_deps sidecar.exe); do
            cp -n "$dll" "$DIST/" 2>/dev/null || true
          done

          # ---------- 2. GStreamer plugin .dlls ----------
          cp /mingw64/lib/gstreamer-1.0/*.dll "$DIST/lib/gstreamer-1.0/"

          # ---------- 3. DLLs needed by the plugins themselves ----------
          for plugin in "$DIST/lib/gstreamer-1.0/"*.dll; do
            for dll in $(collect_deps "$plugin"); do
              cp -n "$dll" "$DIST/" 2>/dev/null || true
            done
          done

          # ---------- 4. Verify no MINGW64 deps are missing ----------
          echo "=== Bundled DLLs ==="
          ls -1 "$DIST/"*.dll | wc -l
          echo ""

          MISSING=$(ntldd -R "$DIST/sidecar.exe" 2>/dev/null \
            | grep -i 'not found' || true)
          if [ -n "$MISSING" ]; then
            echo "WARNING: missing DLLs:"
            echo "$MISSING"
          else
            echo "All DLL dependencies resolved."
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: sidecar-windows-amd64
          path: dist/
          retention-days: 7
